name: Inspect tire measurement dataset

on:
  pull_request:
    paths:
      - '.github/workflows/inspect-tire-measurement-dataset.yml'
      - 'tools/inspect_tire_measurement_dataset.py'
  workflow_dispatch:

jobs:
  inspect-dataset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inspect KIT RADAR dataset
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dataset-inspection
          mkdir -p dataset-inspection
          curl --fail --location --retry 3 --dump-header dataset-inspection/doi-headers.txt \
            'https://doi.org/10.35097/p0rr2jc5wmf0drf8' \
            --output dataset-inspection/landing.html
          curl --fail --location --retry 3 \
            'https://api.datacite.org/dois/10.35097/p0rr2jc5wmf0drf8' \
            --output dataset-inspection/datacite.json
          curl --fail --location --retry 3 \
            'https://publikationen.bibliothek.kit.edu/1000181287' \
            --output dataset-inspection/kitopen.html
          python tools/inspect_tire_measurement_dataset.py dataset-inspection

      - name: Upload inspected dataset
        uses: actions/upload-artifact@v4
        with:
          name: tire-measurement-dataset-inspection
          path: dataset-inspection
          if-no-files-found: error
