name: Inspect tire measurement dataset

on:
  pull_request:
    paths:
      - '.github/workflows/inspect-tire-measurement-dataset.yml'
      - 'tools/inspect_tire_measurement_dataset.py'
  workflow_dispatch:

jobs:
  inspect-dataset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Dataverse metadata and files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dataset-inspection
          curl --fail --location --retry 3 \
            'https://edatos.consorciomadrono.es/api/datasets/:persistentId/?persistentId=doi%3A10.21950%2FCYZEAH' \
            --output dataset-inspection/dataset.json
          curl --fail --location --retry 3 \
            'https://edatos.consorciomadrono.es/api/access/dataset/:persistentId/?persistentId=doi%3A10.21950%2FCYZEAH' \
            --output dataset-inspection/dataset.zip
          python tools/inspect_tire_measurement_dataset.py dataset-inspection

      - name: Upload inspected dataset
        uses: actions/upload-artifact@v4
        with:
          name: tire-measurement-dataset-inspection
          path: dataset-inspection
          if-no-files-found: error
